name: openincident
version: "1.0.0"
description: "DevOps Incident Response Environment"

entrypoint:
  python_module: server.app:app

port: 7860

environment:
  type: "http"
  url: "http://localhost:7860"

# Observation space schema
observation:
  type: "dict"
  properties:
    alert: { type: "string" }
    logs: { type: "list", items: { type: "string" } }
    system_status: { type: "string", enum: ["healthy", "warning", "critical", "down"] }
    cpu_usage: { type: "float", min: 0.0, max: 100.0 }
    memory_usage: { type: "float", min: 0.0, max: 100.0 }

# Action space schema
action:
  type: "string"
  enum: ["check_logs", "restart_service", "scale_up", "kill_process", "change_config", "clear_cache"]

# Evaluation tasks
tasks:
  - id: "easy"
    description: "Resolve a single service CPU spike using restart_service."
    difficulty: "easy"
    max_steps: 5
    reward_range: [0.0, 1.0]
  - id: "medium"
    description: "Identify a memory leak, kill the leaking process, and restart the service."
    difficulty: "medium"
    max_steps: 10
    reward_range: [0.0, 1.0]
  - id: "hard"
    description: "Handle a cascading microservice failure."
    difficulty: "hard"
    max_steps: 15
    reward_range: [0.0, 1.0]

# Deployment configuration
deploy:
  engine: "docker"
  dockerfile: "server/Dockerfile"
  port: 7860
